<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南书房 - 枢密院机要总管</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');

        /* 皇宫暗黑奢华风：朱红与赤金 */
        body {
            font-family: 'Noto Serif SC', '楷体', serif;
            /* 幽深宫廷背景 */
            background: radial-gradient(circle at center, #4A1515 0%, #1A0505 100%);
            color: #F4E4BC;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 传统纹理遮罩 */
        .palace-texture {
            position: absolute;
            inset: 0;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M54.627 0l.83.83-5.556 5.556H48V4.542l6.627-4.542zm-12 0l.83.83-5.556 5.556H36V4.542l6.627-4.542zm-12 0l.83.83-5.556 5.556H24V4.542l6.627-4.542zm-12 0l.83.83-5.556 5.556H12V4.542l6.627-4.542zm-12 0l.83.83-5.556 5.556H0V4.542L6.627 0z' fill='%23F4E4BC' fill-opacity='1' fill-rule='evenodd'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* 赤金点缀文字 */
        .imperial-gold-text {
            color: #D4AF37;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.4);
            letter-spacing: 2px;
        }

        /* 顶部牌匾 */
        header {
            background: linear-gradient(to bottom, #2C0B0B, #4A1515);
            border-bottom: 3px solid #D4AF37;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 10;
        }

        /* 皇上的圣旨气泡 */
        .msg-emperor {
            background: linear-gradient(135deg, #D4AF37 0%, #AA8022 100%);
            color: #2C0B0B;
            border: 1px solid #FFF3D3;
            border-radius: 1rem 0 1rem 1rem;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2);
            font-weight: 700;
        }

        /* 小桂子的奏折气泡 */
        .msg-guizi {
            background: rgba(44, 11, 11, 0.8);
            border: 1px solid #8B6508;
            color: #F4E4BC;
            border-radius: 0 1rem 1rem 1rem;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 4px 10px rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
        }

        /* 底部御案（输入框区域） */
        footer {
            background: linear-gradient(to top, #1A0505, rgba(26,5,5,0.9));
            border-top: 1px solid #8B6508;
            z-index: 10;
        }

        #user-input {
            background: rgba(0,0,0,0.4);
            border: 1px solid #8B6508;
            color: #F4E4BC;
            transition: all 0.3s ease;
        }

        #user-input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        #user-input::placeholder {
            color: #8B6508;
        }

        /* 传旨按钮 */
        #send-btn {
            background: linear-gradient(to bottom, #D4AF37, #AA8022);
            color: #2C0B0B;
            border: 1px solid #FFF3D3;
            transition: all 0.2s;
        }
        
        #send-btn:hover {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
        }

        #send-btn:active {
            transform: translateY(1px);
        }

        /* 滚动条奢华处理 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1A0505; }
        ::-webkit-scrollbar-thumb { background: #8B6508; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }

        .chat-area { position: relative; z-index: 5; }
    </style>
</head>
<body>
    <div class="palace-texture"></div>

    <header class="p-4 px-8 flex items-center justify-between">
        <div class="flex items-center space-x-4">
            <svg class="w-12 h-12" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="46" stroke="#D4AF37" stroke-width="2"/>
                <circle cx="50" cy="50" r="38" stroke="#8B6508" stroke-width="1" stroke-dasharray="4 4"/>
                <path d="M50 15 L50 85 M15 50 L85 50" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>
                <circle cx="50" cy="50" r="15" fill="#D4AF37" opacity="0.2"/>
                <path d="M40 40 L60 60 M60 40 L40 60" stroke="#D4AF37" stroke-width="2"/>
            </svg>
            <h1 class="text-3xl font-black imperial-gold-text">南书房 · 枢密院</h1>
        </div>
        <div class="flex items-center space-x-2 border border-[#8B6508] rounded-sm px-3 py-1 bg-black/30">
            <div class="w-2 h-2 rounded-full bg-[#D4AF37] animate-pulse"></div>
            <div class="text-sm text-[#D4AF37] tracking-widest">海利亚神机运转中</div>
        </div>
    </header>

    <main id="chat-container" class="chat-area flex-1 overflow-y-auto p-6 space-y-8 max-w-5xl mx-auto w-full">
        <div class="flex justify-start items-start w-full">
            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-[#8B6508] bg-[#1A0505] flex-shrink-0 mr-4 shadow-[0_0_10px_rgba(212,175,55,0.2)]">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="100" height="100" fill="#2C0B0B"/>
                    <path d="M30 60 Q50 30 70 60 L80 100 L20 100 Z" fill="#4A1515"/> <circle cx="50" cy="45" r="20" fill="#F4E4BC"/> <path d="M25 35 Q50 15 75 35 L70 40 Q50 25 30 40 Z" fill="#111"/>
                    <circle cx="50" cy="20" r="5" fill="#CB2A2A"/> </svg>
            </div>
            <div class="msg-guizi px-6 py-4 max-w-[80%] whitespace-pre-wrap leading-loose tracking-wide text-md">奴才小桂子，叩见皇上！万岁万岁万万岁！
微臣已在南书房候旨。皇上若是对旗下诸品类的御用之物（如视觉图样、营造规矩）有任何旨意，或需微臣查阅过往的内务府档案，请皇上随时赐下圣旨。</div>
        </div>
    </main>

    <footer class="p-6">
        <div class="max-w-5xl mx-auto flex items-end space-x-4 relative">
            <textarea id="user-input" 
                class="flex-1 rounded-sm px-6 py-4 text-lg resize-none h-16 overflow-hidden" 
                placeholder="皇上请下旨..." 
                autocomplete="off"></textarea>
            
            <button id="send-btn" 
                class="h-16 px-8 rounded-sm font-black tracking-widest text-xl flex items-center justify-center shadow-lg">
                <span id="btn-text">传旨</span>
            </button>
        </div>
    </footer>

    <script>
        // 🚨 皇上，请将此处的地址核对无误。若用正式地址，切记打开 n8n 右上角的 Active 开关！
        const N8N_WEBHOOK_URL = 'https://zcaaron7.app.n8n.cloud/webhook/my-super-agent'; 

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const btnText = document.getElementById('btn-text');

        let sessionId = localStorage.getItem('emperor_session_id');
        if (!sessionId) {
            sessionId = 'IMPERIAL_' + Math.random().toString(36).substring(2, 10).toUpperCase();
            localStorage.setItem('emperor_session_id', sessionId);
        }

        // 自动调整输入框高度
        userInput.addEventListener('input', function() {
            this.style.height = '4rem';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.value.trim().length > 0) {
                sendBtn.style.boxShadow = '0 0 20px rgba(212, 175, 55, 0.8)';
            } else {
                sendBtn.style.boxShadow = 'none';
            }
        });

        // 插入消息
        function addMessage(role, text) {
            const isUser = role === 'user';
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start items-start'} w-full`;
            
            if (isUser) {
                msgDiv.innerHTML = `
                    <div class="msg-emperor px-6 py-4 max-w-[80%] whitespace-pre-wrap leading-loose tracking-wide text-md">
                        ${text}
                    </div>
                `;
            } else {
                msgDiv.innerHTML = `
                    <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-[#8B6508] bg-[#1A0505] flex-shrink-0 mr-4 shadow-[0_0_10px_rgba(212,175,55,0.2)]">
                        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="100" height="100" fill="#2C0B0B"/>
                            <path d="M30 60 Q50 30 70 60 L80 100 L20 100 Z" fill="#4A1515"/>
                            <circle cx="50" cy="45" r="20" fill="#F4E4BC"/>
                            <path d="M25 35 Q50 15 75 35 L70 40 Q50 25 30 40 Z" fill="#111"/>
                            <circle cx="50" cy="20" r="5" fill="#CB2A2A"/>
                        </svg>
                    </div>
                    <div class="msg-guizi px-6 py-4 max-w-[80%] whitespace-pre-wrap leading-loose tracking-wide text-md">
                        ${text}
                    </div>
                `;
            }
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 发送核心逻辑
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            userInput.style.height = '4rem';
            userInput.disabled = true;
            sendBtn.disabled = true;
            btnText.innerHTML = '传令中...';
            sendBtn.style.opacity = '0.7';

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, sessionId: sessionId })
                });

                if (!response.ok) throw new Error('网络请求失败');
                
                const data = await response.json();
                addMessage('agent', data.reply || "微臣已将旨意记下，但未获神机回复。");

            } catch (error) {
                console.error(error);
                addMessage('agent', '❌ 启禀皇上，微臣未能联系上总管大印！指令传送中断。请皇上移步机关处（n8n），查验右上角的【Active】总开关是否已然亮起？');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                btnText.innerHTML = '传旨';
                sendBtn.style.opacity = '1';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
