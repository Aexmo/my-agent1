<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忠诚的小桂子 - Kinkiliving 专属助理</title>
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 深度定制 CSS：还原王国之泪 UI */
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #0c1c22; /* 裂隙深处的色调 */
            background-image: 
                radial-gradient(circle at center, transparent 30%, rgba(10, 137, 123, 0.05) 100%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231affd5' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
                url("https://www.transparenttextures.com/patterns/cracked-earth.png"); /* 裂痕石板纹理 */
        }

        .hylian-title {
            font-family: 'Grenze Gotisch', serif; /* 接近游戏 LOGO 的字体 */
            color: #f5d67d; /* 传说中的金色 */
            text-shadow: 0 0 10px rgba(245, 214, 125, 0.5);
            letter-spacing: 1px;
        }

        /* 老板（用户）的消息：深蓝石板碎片 */
        .msg-user {
            background-color: #172c3d;
            border: 2px solid #3c617c;
            border-right: none;
            color: #d8e5ee;
            border-radius: 1rem 0rem 1rem 1rem;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.3);
            position: relative;
        }
        
        .msg-user::after {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            width: 15px;
            height: 15px;
            background-color: #0c1c22;
            border-left: 2px solid #3c617c;
            border-bottom: 2px solid #3c617c;
        }

        /* 小桂子（AI）的消息：古代遗迹 stone，带有青色荧光 */
        .msg-agent {
            background-color: #2a2a2e;
            color: #c0c0c5;
            border: 1px solid #0a897b;
            box-shadow: 0 0 15px rgba(26, 255, 213, 0.2); /* 青色荧光 */
            border-radius: 0rem 1rem 1rem 1rem;
            position: relative;
        }

        /* Agent 消息的古代装饰四角 */
        .msg-agent-corner-tl { position: absolute; top: -1px; left: -1px; width: 8px; height: 8px; border-top: 3px solid #1affd5; border-left: 3px solid #1affd5; }
        .msg-agent-corner-br { position: absolute; bottom: -1px; right: -1px; width: 8px; height: 8px; border-bottom: 3px solid #1affd5; border-right: 3px solid #1affd5; }

        /* 输入框的荧光效果 */
        #user-input {
            background-color: #1a1a1e;
            color: #a0a0aa;
            border: 2px solid #2f3c47;
            transition: all 0.3s;
        }
        
        #user-input:focus {
            outline: none;
            border-color: #81e6d9;
            box-shadow: 0 0 10px rgba(129, 230, 217, 0.5);
        }

        /* 发送按钮：电池形状 */
        #send-btn {
            background: linear-gradient(135deg, #0a897b 0%, #1affd5 100%);
            border: 2px solid #000;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        #send-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
            transition: all 0.2s;
        }

        #send-btn:hover {
            box-shadow: 0 0 15px rgba(26, 255, 213, 0.8);
            transform: scale(1.05);
        }
        
        #send-btn:hover::before {
            left: 100%;
            top: 100%;
        }

        #send-btn:active {
            transform: scale(0.95);
        }
        
        /* 充能金色状态 */
        #send-btn.ready {
            background: linear-gradient(135deg, #f5d67d 0%, #ffeb3b 100%);
            box-shadow: 0 0 15px rgba(255, 235, 59, 0.8);
        }
        
        /* 自定义滚动手柄 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0c1c22; }
        ::-webkit-scrollbar-thumb { background: #2f3c47; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #0a897b; }

    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-black/60 backdrop-blur-sm p-4 px-6 flex items-center justify-between border-b-2 border-[#f5d67d]/20">
        <div class="flex items-center space-x-3">
            <svg class="w-10 h-10" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#f5d67d" stroke-width="4" fill="rgba(0,0,0,0.4)"/>
                <path d="M50 20 V80 M20 50 H80" stroke="#f5d67d" stroke-width="4"/>
                <circle cx="50" cy="50" r="10" stroke="#1affd5" stroke-width="6" stroke-dasharray="2 2"/>
            </svg>
            <h1 class="text-3xl hylian-title tracking-widest">忠诚的小桂子</h1>
        </div>
        <div class="flex items-center space-x-3">
            <div class="w-4 h-4 rounded-full bg-[#1affd5] animate-pulse" style="box-shadow: 0 0 10px #1affd5;"></div>
            <div class="text-xs tracking-wider" style="color: #1affd5;">海利亚记忆网络</div>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 max-w-5xl mx-auto w-full">
        <div class="flex justify-start">
            <div class="msg-agent px-6 py-4 shadow-xl max-w-[85%] whitespace-pre-wrap leading-relaxed tracking-wider">
                <div class="msg-agent-corner-tl"></div>
                老板好，这里是忠诚的小桂子。

我已成功接收“海利亚记忆网络（Supabase）”的充能。无论是旗下各个品牌的视觉策划，还是多平台的电商营销方案，请尽情对我说。
            </div>
        </div>
    </main>

    <footer class="p-5 pb-8 relative" style="background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');">
        <div class="absolute top-0 left-0 right-0 h-1 bg-[#2f3c47]"></div>
        <div class="absolute -top-1 left-1/2 -translate-x-1/2 w-20 h-3 bg-[#0a897b]" style="box-shadow: 0 0 8px #1affd5; border-radius: 0 0 10px 10px;"></div>

        <div class="max-w-5xl mx-auto flex items-center space-x-5">
            <input type="text" id="user-input" 
                class="flex-1 rounded-lg px-6 py-4 text-base focus:outline-none placeholder:text-[#505055]" 
                placeholder="请授予具体的策划指令..." 
                autocomplete="off">
            
            <button id="send-btn" 
                class="w-16 h-16 rounded-full font-serif flex items-center justify-center text-black font-bold tracking-tighter text-sm">
                <span>充能</span>
            </button>
        </div>
    </footer>

    <script>
        // 🚨 请把你刚才在 n8n 复制的 Production Webhook URL 粘贴在下面的引号里！
        const N8N_WEBHOOK_URL = 'https://zcaaron7.app.n8n.cloud/webhook/my-super-agent';

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // 生成并获取唯一的 Session ID (保证无限记忆不串台)
        let sessionId = localStorage.getItem('agent_session_id');
        if (!sessionId) {
            // 生成一个模拟 Sheikah Slate ID 风格的 random
            sessionId = 'SLATE_' + Math.random().toString(36).substring(2, 10).toUpperCase();
            localStorage.setItem('agent_session_id', sessionId);
        }

        // 输入框逻辑：当有内容时，按钮变成金色
        userInput.addEventListener('input', () => {
            if (userInput.value.trim().length > 0) {
                sendBtn.classList.add('ready');
                sendBtn.querySelector('span').innerHTML = '释放';
            } else {
                sendBtn.classList.remove('ready');
                sendBtn.querySelector('span').innerHTML = '充能';
            }
        });

        // 在页面上添加聊天气泡的函数
        function addMessage(role, text) {
            const isUser = role === 'user';
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full`;
            
            if (isUser) {
                msgDiv.innerHTML = `
                    <div class="msg-user px-6 py-4 shadow-xl max-w-[85%] whitespace-pre-wrap leading-relaxed tracking-wider">
                        ${text}
                    </div>
                `;
            } else {
                msgDiv.innerHTML = `
                    <div class="msg-agent px-6 py-4 shadow-xl max-w-[85%] whitespace-pre-wrap leading-relaxed tracking-wider">
                        <div class="msg-agent-corner-tl"></div>
                        <div class="msg-agent-corner-br"></div>
                        ${text}
                    </div>
                `;
            }
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight; // 自动滚动到底部
        }

        // 发送消息到 n8n 的核心逻辑
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. 显示用户的消息
            addMessage('user', text);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.innerHTML = '<span class="animate-pulse">充能中...</span>';
            sendBtn.classList.remove('ready');

            try {
                // 2. 将消息和 SessionID 发给 n8n
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        sessionId: sessionId
                    })
                });

                if (!response.ok) throw new Error('网络请求失败');
                
                // 3. 接收 n8n 返回的 JSON 数据
                const data = await response.json();
                
                // 4. 显示 Agent 的回复
                addMessage('agent', data.reply || "。指令已确认，但未能返回海利亚信息文本。");

            } catch (error) {
                console.error(error);
                addMessage('agent', '❌ 指令传送中断。请的老板确认为“忠诚的小桂子”激活了 n8n Webhook。');
            } finally {
                userInput.disabled = false;
                userInput.focus();
                sendBtn.innerHTML = '<span>充能</span>';
            }
        }

        // 绑定点击和回车事件
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
